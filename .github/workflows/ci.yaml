---
name: CI

on:
  push:
    branches:
      - main
      - next
  pull_request:
    branches:
      - next
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  cms:
    name: CMS Testing
    runs-on: "ubuntu-latest"
    defaults:
      run:
        working-directory: "cms"
    steps:
      - uses: actions/checkout@v5
      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: 1.25
          cache-dependency-path: "cms/go.sum"
      # You can test your matrix by printing the current Go version
      - name: Display Go version
        run: go version
      - name: Install dependencies
        run: go mod tidy
      - name: Testing
        run: go test -test.v ./test
