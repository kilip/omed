---
name: CI

on:
  push:
    branches:
      - main
      - next
  pull_request:

jobs:
  api:
    name: API
    uses: kilip/gh-common/.github/workflows/php.yaml@main
    with:
      php_version: 8.4
      working_dir: ./apps/api
      codecov_flags: api
    secrets: inherit

  node:
    name: "Test ${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - filter: "@omed/dash"
            name: Dashboard
            working_dir: apps/dash
            coverage_flag: dash
      fail-fast: true
    steps:
      - uses: actions/checkout@v4

      - uses: kilip/gh-common/.github/actions/setup-node@main
        with:
          node_version: 22

      - name: Run test
        run: pnpm --filter=${{ matrix.filter }} coverage

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          working-directory: ${{ matrix.working_dir }}
          directory: "coverage"
          flags: ${{ matrix.coverage_flag }}
          verbose: true

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: kilip/gh-common/.github/actions/setup-node@main
        with:
          node_version: 22

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright # Adjust for Windows/macOS if needed
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/ppnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
        id: pw_cache

      - name: Install Playwright browsers
        run: pnpx playwright install --with-deps
        working-directory: "apps/dash"
        if: steps.pw_cache.outputs.cache-hit != 'true'

      - run: pnpm e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: ["e2e"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        uses: ./.github/actions/build-container
        with:
          prefix: ghcr.io/kilip/omed
          dockerfile: ./apps/api/Dockerfile
          target: frankenphp_prod
          context: ./apps/api
          ref_name: ${{ github.ref_name }}
