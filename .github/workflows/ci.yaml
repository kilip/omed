---
name: CI

on:
  push:
    branches:
      - main
      - next
  pull_request:

jobs:
  api:
    name: API
    uses: kilip/gh-common/.github/workflows/php.yaml@main
    with:
      php_version: 8.4
      working_dir: ./apps/api
      codecov_flags: api
    secrets: inherit

  node:
    name: "Test ${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - filter: "@omed/dash"
            name: Dashboard
            working_dir: apps/dash
            coverage_flag: dash
      fail-fast: true
    steps:
      - uses: actions/checkout@v4

      - uses: kilip/gh-common/.github/actions/setup-node@main
        with:
          node_version: 22

      - name: Run test
        run: pnpm --filter=${{ matrix.filter }} coverage

      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          working-directory: ${{ matrix.working_dir }}
          directory: "coverage"
          flags: ${{ matrix.coverage_flag }}
          verbose: true

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright # Adjust for Windows/macOS if needed
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package.json') }} # Include package.json hash for Playwright version changes
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpx playwright install --with-deps
        working-directory: "apps/dash"

      - run: pnpm e2e
