services:
  cms:
    container_name: omed.cms
    image: ghcr.io/kilip/omed-cms:latest
    build:
      context: ./cms
      target: prod
    # command: "/omed/cms"
    ports:
      - 3000:3000
    volumes:
      - ./vars/data:/data
    env_file:
      - .env
      - .env.local
    environment:
      OMED_APP_ENV: production
      OMED_DB_DRIVER: sqlite

  db:
    container_name: omed.db
    image: postgres:alpine
    environment:
      POSTGRES_USER: ${OMED_DB_USERNAME}
      POSTGRES_PASSWORD: ${OMED_DB_PASSWORD}
      POSTGRES_DB: ${OMED_DB_NAME}
    ports:
      - 5432:5432
    volumes:
      - ./vars/db:/var/lib/postgresql/data

volumes:
  postgres-db:
